<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ネオンアーケード//メガゲームセンター</title>
   <script
  src="https://challenges.cloudflare.com/turnstile/v0/api.js"
  async
  defer
></script>
    <style>
        /* 3. 認証が完了するまで画面全体を覆うスタイル */
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
        }
        #auth-overlay h2 {
            font-family: sans-serif;
            color: #fff;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div id="auth-overlay" class="box">
    <h2>安全な接続を確認しています</h2>
    <!-- ⚠️ ご自身のTurnstileサイトキーに書き換えてください -->
    <div class="cf-turnstile" data-sitekey="**************" data-callback="onAuthSuccess"></div>
</div>

<!-- 🕹️ ゲーム本体 -->
<div id="root"></div>

<script>
function onAuthSuccess(token) {
    // 1. 認証画面を消去
    document.getElementById('auth-overlay').remove();
    // 2. ゲームプログラムを呼び出して起動
    const script = document.createElement('script');
    script.type = 'module';
    script.src = '/src/main.tsx'; // 実際のゲームエントリーポイント
    document.body.appendChild(script);
}
</script>
</body>
</html>
