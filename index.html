<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ネオンアーケード//メガゲームセンター</title>
<script
  src="https://challenges.cloudflare.com/turnstile/v0/api.js"
  async
  defer
></script>
    <style>
        html, body {
            background: #111 !important;
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden;
        }
        /* 認証が完了するまで画面全体を完全にロックする黒画面 */
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 99999;
        }
        #auth-overlay h2 {
            font-family: sans-serif;
            color: #fff;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: normal;
        }
    </style>
</head>
<body>

<!-- 🔒 認証が完了するまで画面全体を覆うコンテナ -->
<div id="auth-overlay">
    <h2>安全な接続を確認しています</h2>
<div class="cf-turnstile" data-sitekey="<YOUR-SITE-KEY>"></div>
    <div
  class="cf-turnstile"
  data-sitekey="<YOUR-SITE-KEY>"
  data-theme="light"
  data-size="normal"
  data-callback="onSuccess"
></div>
</div>

<script>
    const widgetId = turnstile.render("#turnstile-container", {
  sitekey: "<YOUR-SITE-KEY>",
  callback: function (token) {
    console.log("Success:", token);
  },
});
async function onAuthSuccess() {
    try {
        // 同一階層にあるゲーム本体（game.html）を裏側でロード
        const response = await fetch('./game.html');
        if (!response.ok) throw new Error('HTMLの読み込みエラー');
        const htmlText = await response.text();
        
        // 2. 認証ロック用の黒画面を画面から完全に消去
        document.getElementById('auth-overlay').remove();
        
        // 3. 画面を真っ白にさせず、game.htmlのデータで画面を丸ごと安全に置き換える
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlText, 'text/html');
        
        // 全体のHTMLをゲームのものに上書き
        document.documentElement.innerHTML = doc.documentElement.innerHTML;
        
        // 4. ゲームを動かすためのViteプログラム（TypeScript等）の命令を強制的に再起動させる
        const scripts = document.querySelectorAll('script');
        scripts.forEach(oldScript => {
            const newScript = document.createElement('script');
            Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
            newScript.appendChild(document.createTextNode(oldScript.innerHTML));
            oldScript.parentNode.replaceChild(newScript, oldScript);
        });

    } catch (error) {
        console.error('ゲーム画面への移行に失敗しました:', error);
    }
}
</script>
</body>
</html>
