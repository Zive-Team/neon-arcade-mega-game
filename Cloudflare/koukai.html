<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ネオン アーケード // メガゲームセンター</title>
    <!-- Turnstile APIの読み込み -->
   <script
  src="https://challenges.cloudflare.com/turnstile/v0/api.js"
  async
  defer
></script>
    <style>
        /* 1. iPhoneの引っ張り更新（Pull-to-refresh）を許可する設定 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111;
            /* 画面全体のスクロールと、引っ張った時のバウンス挙動を有効化 */
            overflow-y: auto;
            overscroll-behavior-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* 2. ゲーム画面（iframe）のレスポンシブ・スクロール対応 */
        #game-container {
            width: 100%;
            height: 100%;
            display: none; /* 初期状態は非表示（認証後に表示） */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* 3. 認証が完了するまで画面全体を覆うスタイル */
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
        }
        #auth-overlay h2 {
            font-family: sans-serif;
            color: #fff;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <!-- ページを開いた瞬間に表示される認証エリア -->
    <div id="auth-overlay">
        <h2>安全な接続を確認しています...</h2>
        <div id="turnstile-container"></div>
    </div>

    <!-- 修正ポイント：iframeを直接ではなく、専用のコンテナで包む -->
    <div id="game-container">
        <iframe id="game-frame" src="https://*******************"></iframe>
    </div>

    <script>
        // ページが読み込まれたら自動的にTurnstileを起動
        window.onload = function() {
            if (typeof turnstile !== 'undefined') {
                turnstile.render('#turnstile-container', {
                    // あなたのTurnstileサイトキー
                    sitekey: '**************', 
                    callback: function(token) {
                        // 認証成功時の処理
                        document.getElementById('auth-overlay').style.display = 'none'; // 目隠しを消す
                        document.getElementById('game-container').style.display = 'block'; // コンテナごとゲームを出す
                    }
                });
            }
        };
    </script>
</body>
</html>
